services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/saar
      REDIS_URL: redis://redis:6379/0
      WORKFLOW_DIR: /app/workflows
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/saar
      REDIS_URL: redis://redis:6379/0
      WORKFLOW_DIR: /app/workflows
      AUTO_CREATE_TABLES: "true"
    command: celery -A apps.api.app.tasks:celery_app worker -Q gpu --loglevel=INFO --concurrency=1
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: /api/proxy
      SAAR_API_URL: http://api:8000
      SAAR_API_TOKEN: ${API_AUTH_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
